services:
  - type: web
    name: invoicehub-whatsapp-bridge
    env: docker
    rootDir: whatsapp-bridge
    plan: starter
    healthCheckPath: /health
    disk:
      name: whatsapp-sessions
      mountPath: /app/.sessions
      sizeGB: 1
    envVars:
      - key: WHATSAPP_BRIDGE_BASE_URL
        sync: false
      - key: WHATSAPP_BRIDGE_API_KEY
        generateValue: true
      - key: WHATSAPP_BRIDGE_PORT
        value: 8787
